<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JARVIS Focus System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grid"></div>
<div class="scanline"></div>
<div class="ring"></div>

<div class="timer" id="timer">25:00</div>

<!-- LEFT PANEL -->
<div class="panel left">
    <h4>CONTROL</h4>
    <button onclick="start()">START</button>
    <button onclick="pause()">PAUSE</button>
    <button onclick="reset()">RESET</button>
    <button onclick="toggleTheme()">THEME</button>

    <h4>SUBJECT</h4>
    <div id="subjectDisplay">Subject: General</div>
    <button onclick="setSubject('Physics')">Physics</button>
    <button onclick="setSubject('Chemistry')">Chem</button>
    <button onclick="setSubject('Math')">Math</button>
</div>

<!-- RIGHT PANEL -->
<div class="panel right">
    <h4>SYSTEM LOG</h4>
    <div class="terminal" id="terminal"></div>

    <input id="jarvisInput" placeholder="Ask JARVIS..." style="width:100%; background:black; color:#00ffff; border:none; margin-top:10px;">

    <div id="stats"></div>

    <br>
    <a href="analytics.html" style="color:#ff00ff;">→ Analytics</a>
</div>

<div class="cursor-glow" id="cursorGlow"></div>

<script src="script.js"></script>

<script>
/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark-mode");
}

/* PARTICLES */
document.addEventListener("mousemove", (e)=>{
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 500);
});

/* CURSOR */
let glow = document.getElementById("cursorGlow");
document.addEventListener("mousemove", (e)=>{
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

/* JARVIS INPUT */
document.getElementById("jarvisInput").addEventListener("keydown", function(e){
    if(e.key==="Enter"){
        let input = this.value;
        this.value="";
        let res = jarvis(input);
        log("> " + input);
        log(res);
    }
});

/* AUDIO REACTIVE */
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream=>{
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();

    src.connect(analyser);
    analyser.fftSize = 64;

    const data = new Uint8Array(analyser.frequencyBinCount);

    function animate(){
        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b)=>a+b)/data.length;

        document.querySelector(".ring").style.boxShadow =
            `0 0 ${avg/2}px var(--primary)`;

        requestAnimationFrame(animate);
    }

    animate();
});
</script>

</body>
</html>
